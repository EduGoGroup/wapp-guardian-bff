{{ define "login.html" }}
<section class="auth-center">
    <div class="card">
        <p class="eyebrow">Consola de operación</p>
        <h1 class="headline">Entrar</h1>
        <p class="body">Accede con las credenciales de tu tenant en la plataforma wApp.</p>

        {{ if .Error }}
        <div class="snackbar snackbar--error" role="alert">{{ .Error }}</div>
        {{ end }}

        <form method="POST" action="/login" class="stack" autocomplete="on">
            <div class="field">
                <label class="field__label" for="email">Correo</label>
                <input class="field__input" type="email" id="email" name="email"
                       autocomplete="username" required autofocus placeholder="tu@empresa.com">
            </div>
            <div class="field">
                <label class="field__label" for="password">Contraseña</label>
                <input class="field__input" type="password" id="password" name="password"
                       autocomplete="current-password" required placeholder="••••••••">
            </div>
            <div class="row">
                <button type="submit" class="btn btn--filled">Entrar</button>
            </div>
        </form>
    </div>
</section>
{{ end }}
